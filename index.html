<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>João Nunes - Portfólio</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>

/* FUNDO */
html, body{
    margin:0;
    padding:0;
    overflow:hidden;

    font-family:'Press Start 2P', cursive;

    background-image:url("fundoreal.jpg.png");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

    height:100vh;
}

/* CENTRALIZA */
body{
    display:flex;
    justify-content:center;
    align-items:center;
}

/* CONTAINER */
.container{
    text-align:center;
}

/* CAIXA DO TÍTULO */
.title-box{

    background:rgba(18,14,11,.82);

    border:4px solid #4F4638;

    padding:25px 35px;

    margin-bottom:25px;

    display:flex;
    flex-direction:column;
    align-items:flex-start;

    box-shadow:
        0 0 35px rgba(0,0,0,.80);

}

/* TÍTULO */
.line1,
.line2{

    font-size:42px;
    letter-spacing:3px;

    color:#C6AE77;

    text-shadow:
        3px 3px 0 #0A0806,
        0 0 6px rgba(255,180,80,.12);

}

/* PRESS START */
#start{

    cursor:pointer;

    font-size:18px;

    color:#A88445;

    text-shadow:
        2px 2px 0 #090705;

    animation:piscar 1s infinite;

    margin-top:10px;

}

@keyframes piscar{

    0%,100%{
        opacity:1;
    }

    50%{
        opacity:.35;
    }

}

/* ESCOLHA */
#escolha{

    display:none;

    margin-bottom:20px;

    font-size:20px;

    color:#C6AE77;

    text-shadow:
        2px 2px 0 #090705;

}

/* MENU */
#menu{

    display:none;
    margin-top:10px;

}

/* BOTÕES */

button{

    font-family:'Press Start 2P', cursive;

    background:rgba(22,17,13,.88);

    border:4px solid #4F4638;

    color:#C6AE77;

    padding:20px 30px;

    margin:12px;

    cursor:pointer;

    font-size:12px;

    text-shadow:
        2px 2px 0 #090705;

    box-shadow:
        5px 5px 0 rgba(0,0,0,.70);

    transition:.2s;

}

/* HOVER */

button:hover{

    background:rgba(34,27,20,.95);

    border-color:#7A6848;

    color:#E3C98E;

    transform:scale(1.05);

}
</style>

</head>

<body>

<div class="container">

    <div class="title-box" id="titulo">

        <div class="line1">CURRÍCULO</div>

        <div class="line2">JOÃO NUNES</div>

    </div>

    <div id="start">
        PRESS START
    </div>

    <div id="escolha">
        ESCOLHA UMA OPÇÃO
    </div>

    <div id="menu">

<button onclick="window.location.href='facil.html'">
    VISÃO RÁPIDA
</button>

<button onclick="window.location.href='dificilmanutenção.html'">
    MODO COMPLETO
</button>

    </div>

</div>

<script>

const start = document.getElementById("start");
const menu = document.getElementById("menu");
const escolha = document.getElementById("escolha");
const titulo = document.getElementById("titulo");

start.addEventListener("click", () => {

    start.style.display = "none";
    titulo.style.display = "none";

    escolha.style.display = "block";
    menu.style.display = "block";

});


</script>
</body>
</html>
